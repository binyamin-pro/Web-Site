    <style>
        html, body {
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            background-color: black;
        }

            body::-webkit-scrollbar {
                display: none;
            }

        .contact-container {
            max-width: 800px;
            margin: 0px auto 60px auto;
            padding: 20px;
            color: white;
            font-family: Arial, sans-serif;
        }

            .contact-container h1 {
                text-align: center;
                margin-bottom: 30px;
            }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                margin-bottom: 5px;
            }

            .form-group input,
            .form-group textarea {
                width: 100%;
                padding: 10px;
                border-radius: 8px;
                border: none;
                outline: none;
                background-color: #1a1a1a;
                color: white;
            }

            .form-group textarea {
                resize: none;
                height: 120px;
            }

        .submit-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff4d6d, #c000ee);
            color: white;
            font-size: 16px;
        }

            .submit-btn:hover {
                opacity: 0.85;
            }

        .social-buttons {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

            .social-buttons a {
                padding: 10px 15px;
                border-radius: 8px;
                text-decoration: none;
                color: white;
                background: #222;
                transition: 0.2s;
            }

                .social-buttons a:hover {
                    background: #444;
                }

        .error-text {
            color: red;
            height: 20px;
            line-height: 20px;
            margin: 5px 0;
        }
    </style>
</head>

        <form id="contactForm">

            </div>

            <div class="form-group">
                <label>Phone</label>

            <div class="form-group">

            </div>

            <div class="form-group">

                <textarea id="message" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
            <p id="errorText" class="error-text"></p>
